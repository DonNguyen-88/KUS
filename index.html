    @keyframes fadeIn {

    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(24px); }

    @keyframes staggerFadeIn {

    const getContextSnippet = (text, keyword, maxLen = 100) => {
      if (!text || !keyword) return "";
      const lowerText = text.toLowerCase();
      const lowerKey = keyword.toLowerCase().trim();
      const index = lowerText.indexOf(lowerKey);
      if (index === -1) {
        return text.length > maxLen ? text.substring(0, maxLen) + "..." : text;
      }
      let start = Math.max(0, index - Math.floor(maxLen / 2));
      let end = Math.min(text.length, start + maxLen);
      if (end === text.length) {
        start = Math.max(0, end - maxLen);
      }
      let snippet = text.substring(start, end);
      if (start > 0) snippet = "..." + snippet;
      if (end < text.length) snippet = snippet + "...";
      return snippet;
    };

    const removeAccents = (str) => {
      if (!str) return '';
      return str
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '')
        .replace(/đ/g, 'd')
        .replace(/Đ/g, 'D');
    };

    const highlightText = (text, keyword) => {
      if (!text || !keyword) return <span>{text}</span>;
      const lowerText = text.toLowerCase();
      const lowerKey = keyword.toLowerCase().trim();
      if (!lowerKey) return <span>{text}</span>;
      const index = lowerText.indexOf(lowerKey);
      if (index === -1) {
        // Fallback to checking the accentless version
        const accLessText = removeAccents(lowerText);
        const accLessKey = removeAccents(lowerKey);
        const altIndex = accLessText.indexOf(accLessKey);
        if (altIndex === -1) return <span>{text}</span>;
        
        const parts = [];
        parts.push(text.substring(0, altIndex));
        parts.push(
          <mark key={altIndex} className="bg-yellow-200 text-yellow-900 font-bold px-0.5 rounded">
            {text.substring(altIndex, altIndex + keyword.length)}
          </mark>
        );
        parts.push(text.substring(altIndex + keyword.length));
        return <>{parts}</>;
      }

      const parts = [];
      let lastIndex = 0;
      let searchIndex = 0;
      while ((searchIndex = lowerText.indexOf(lowerKey, lastIndex)) !== -1) {
        parts.push(text.substring(lastIndex, searchIndex));
        parts.push(
          <mark key={searchIndex} className="bg-yellow-200 text-yellow-900 font-bold px-0.5 rounded">
            {text.substring(searchIndex, searchIndex + keyword.length)}
          </mark>
        );
        lastIndex = searchIndex + keyword.length;
      }
      parts.push(text.substring(lastIndex));
      return <>{parts}</>;
    };

    const sanitizeItems = (data) => {
      if (!Array.isArray(data)) return [];
      return data.map((item, idx) => {
        const safeStr = (val) => {
          if (val === null || val === undefined) return '';
          return String(val).trim();
        };

        const lowerItem = {};
        Object.keys(item).forEach(key => {
          lowerItem[key.toLowerCase()] = item[key];
        });

        const getVal = (possibleKeys) => {
          for (const k of possibleKeys) {
            const lowerK = k.toLowerCase();
            if (lowerItem[lowerK] !== undefined && lowerItem[lowerK] !== null) {
              return lowerItem[lowerK];
            }
          }
          return '';
        };

        const detectedName = getVal(['tentruong', 'ten', 'name']);
        let detectedType = safeStr(getVal(['loaihinh', 'type', 'loai']));

        const cleanType = detectedType.toLowerCase();
        if (cleanType.includes("viện công nghệ") || cleanType.includes("vien cong nghe")) {
          detectedType = "Viện công nghệ";
        } else if (cleanType.includes("cao đẳng công lập") || cleanType.includes("cao dang cong lap") || cleanType.includes("cao đẳng công")) {
          detectedType = "Cao đẳng công lập";
        } else if (cleanType.includes("cao đẳng tư thục") || cleanType.includes("cao dang tu thuc") || cleanType.includes("cao đẳng tư")) {
          detectedType = "Cao đẳng tư thục";
        } else if (cleanType.includes("đại học tư thục") || cleanType.includes("dai hoc tu thuc") || cleanType.includes("đại học tư")) {
          detectedType = "Đại học tư thục";
        } else if (cleanType.includes("đại học công lập") || cleanType.includes("dai hoc cong lap") || cleanType.includes("đại học công") || cleanType.includes("công lập")) {
          detectedType = "Đại học công lập";
        } else {
          detectedType = ""; 
        }

        let detectedRank = safeStr(getVal(['xephang', 'rank', 'ranking']));
        if (detectedRank.includes("1")) {
          detectedRank = "Top 1";
        } else if (detectedRank.includes("2")) {
          detectedRank = "Top 2";
        } else if (detectedRank.includes("3")) {
          detectedRank = "Top 3";
        } else {
          detectedRank = detectedRank ? detectedRank : "Top 1";
        }

        return {
          rowNumber: item.rowNumber || item.rownumber || (idx + 2),
          Khuvuc: safeStr(getVal(['khuvuc', 'region', 'khu vuc'])),
          Tentruong: safeStr(detectedName),
          Ten: safeStr(detectedName), 
          Loaihinh: detectedType,
          Xephang: detectedRank,
          Themanhdaotao: safeStr(getVal(['themanhdaotao', 'themanh', 'strength'])),
          Hocphi: safeStr(getVal(['hocphi', 'tuition', 'fee'])),
          Ghichu: safeStr(getVal(['ghichu', 'note', 'notes']))
        };
      });
    };

          freshItem.Khuvuc !== editingItem.Khuvuc ||
          freshItem.Tentruong !== editingItem.Tentruong ||
          freshItem.Loaihinh !== editingItem.Loaihinh ||
          freshItem.Xephang !== editingItem.Xephang ||
          freshItem.Themanhdaotao !== editingItem.Themanhdaotao ||
          freshItem.Hocphi !== editingItem.Hocphi ||
          freshItem.Ghichu !== editingItem.Ghichu;

        if (isDbChanged) {
          const isUserModified = 
            formData.Khuvuc !== editingItem.Khuvuc ||
            formData.Tentruong !== editingItem.Tentruong ||
            formData.Loaihinh !== editingItem.Loaihinh ||
            formData.Xephang !== editingItem.Xephang ||
            formData.Themanhdaotao !== editingItem.Themanhdaotao ||
            formData.Hocphi !== editingItem.Hocphi ||
            formData.Ghichu !== editingItem.Ghichu;

          if (!isUserModified) {
            setFormData({
              Khuvuc: freshItem.Khuvuc,
              Tentruong: freshItem.Tentruong,
              Loaihinh: freshItem.Loaihinh,
              Xephang: freshItem.Xephang,
              Themanhdaotao: freshItem.Themanhdaotao,
              Hocphi: freshItem.Hocphi,
              Ghichu: freshItem.Ghichu
            });
            setEditingItem(freshItem);
            showAlert('Đã tự động cập nhật thông tin mới nhất từ database!', 'success');
          } else {
            setDbConflictItem(freshItem);
          }
        } else {
          setDbConflictItem(null);
        }
      }, [items, modalOpen]);

      const handleResolveConflict = () => {
        if (!dbConflictItem) return;
        setFormData({
          Khuvuc: dbConflictItem.Khuvuc,
          Tentruong: dbConflictItem.Tentruong,
          Loaihinh: dbConflictItem.Loaihinh,
          Xephang: dbConflictItem.Xephang,
          Themanhdaotao: dbConflictItem.Themanhdaotao,
          Hocphi: dbConflictItem.Hocphi,

        setEditingItem(dbConflictItem);
        setDbConflictItem(null);
        showAlert('Đã đồng bộ dữ liệu mới nhất!', 'success');

      const handleInputChange = (e) => {

      const handleSubmit = async (e) => {
        e.preventDefault();
        if (!formData.Tentruong.trim()) {
          showAlert('Tên trường không được để trống!', 'error');
          return;
        }

        if (isUsingMock) {
          if (editingItem) {
            setItems(prev => sanitizeItems(prev.map(item => 
              item.rowNumber === editingItem.rowNumber ? { ...item, ...formData } : item
            )));
            showAlert('Đã lưu chỉnh sửa!', 'success');
          } else {
            const newRowNumber = Math.max(...items.map(i => i.rowNumber), 1) + 1;
            setItems(prev => sanitizeItems([...prev, { rowNumber: newRowNumber, ...formData }]));
            showAlert('Đã thêm trường học thành công!', 'success');
          }
          setModalOpen(false);
          return;
        }

        setLoading(true);
        setModalOpen(false);

        try {
          const payload = {
            action: editingItem ? 'update' : 'create',
            rowNumber: editingItem ? editingItem.rowNumber : null,
            Ten: formData.Tentruong,
            Tentruong: formData.Tentruong,
            ...formData
          };

          const response = await fetch(apiUrl, {
            method: 'POST',
            headers: {
              'Content-Type': 'text/plain;charset=utf-8',
            },
            body: JSON.stringify(payload)
          });

          const result = await response.json();
          if (result.status === 'success') {
            showAlert(editingItem ? 'Đã lưu chỉnh sửa thành công!' : 'Đã thêm thành công!', 'success');
            await fetchData(apiUrl, false);
          } else {
            throw new Error(result.message);
          }
        } catch (error) {
          showAlert('Lỗi đồng bộ Sheets! Đã lưu tạm dữ liệu cục bộ.', 'error');
          if (editingItem) {
            setItems(prev => sanitizeItems(prev.map(item => 
              item.rowNumber === editingItem.rowNumber ? { ...item, ...formData } : item
            )));
          } else {
            const newRowNumber = Math.max(...items.map(i => i.rowNumber), 1) + 1;
            setItems(prev => sanitizeItems([...prev, { rowNumber: newRowNumber, ...formData }]));
          }
        } finally {
          setLoading(false);
        }
      };

      const handleDeleteItem = async (item, e) => {
        e.stopPropagation();
        if (isUsingMock) {
          setItems(prev => prev.filter(i => i.rowNumber !== item.rowNumber));
          showAlert('Đã xóa thành công!', 'success');
          return;
        }

        setLoading(true);
        try {
          const payload = {
            action: 'delete',
            rowNumber: item.rowNumber

          const response = await fetch(apiUrl, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },

        if (geminiApiKey.trim()) {

              {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                  contents: [{ parts: [{ text: fullPrompt }] }]

              }
            );

            if (!response.ok) {
              const errData = await response.json();
              throw new Error(errData.error?.message || 'Lỗi gọi API Gemini');
            }

            const data = await response.json();
            const generatedText = data.candidates?.[0]?.content?.parts?.[0]?.text;

            showAlert('Lỗi kết nối Gemini API. Sử dụng dữ liệu phân tích hướng nghiệp dự phòng!', 'error');
            setAiResponse(getMockMajorAnalysis(queryName));
          } finally {
            setAiLoading(false);

                                <h4 className="font-bold text-slate-950 text-xs sm:text-sm truncate">
                                  {highlightText(item.Tentruong, searchQuery)}
                                </h4>
                                <RankBadge rank={item.Xephang} />
                              </div>
                              <div className="flex flex-col gap-1.5 mt-0.5">
                                <div className="flex items-center gap-1 text-[10px] sm:text-xs text-slate-500">
                                  📍 <span className="truncate">{highlightText(item.Khuvuc || "Chưa xác định", searchQuery)}</span>
                                </div>
                                {renderSearchSnippet(item)}
                              </div>
                            </div>
                          ))
                        ) : (
                          <div className="p-8 text-center text-slate-400 text-xs sm:text-sm flex flex-col items-center justify-center gap-2 bg-white rounded-xl border border-slate-100">
                            <AlertCircle size={18} className="text-slate-300" />
                            <span>Không tìm thấy thông tin phù hợp</span>
                          </div>
                        )}
                      </div>
                    )}
                  </div>
                )}

              </div>
            </aside>

          </div>

          {/* MODAL: ADD / EDIT DIALOG */}
          {modalOpen && (
            <div 
              onClick={(e) => {
                if (e.target === e.currentTarget) setModalOpen(false);
              }}
              className="fixed inset-0 bg-slate-950/30 backdrop-blur-md flex items-center justify-center p-4 z-[9999] animate-fadeIn"
            >
              <div 
                onClick={(e) => e.stopPropagation()} 
                className="bg-white rounded-[24px] max-w-[696px] w-full shadow-[0_24px_50px_rgba(15,23,42,0.12)] overflow-hidden border border-slate-200/60 transform transition-all duration-300 scale-100 p-6 sm:p-8 flex flex-col gap-4 relative"
              >
                
                {isNotesExpanded ? (
                  <div className="absolute inset-0 bg-white z-[60] flex flex-col animate-fadeIn">
                    <div className="relative flex-1 flex flex-col p-6">
                      <textarea
                        name="Ghichu"
                        value={formData.Ghichu}
                        onChange={handleInputChange}
                        placeholder="Nhập ghi chú thêm về trường, học bổng hoặc lưu ý tuyển sinh..."
                        className="w-full flex-1 p-4 pr-12 bg-slate-50/50 border border-slate-200/60 rounded-2xl text-xs sm:text-sm text-slate-800 placeholder-slate-400/80 focus:outline-none focus:ring-4 focus:ring-emerald-500/5 focus:border-emerald-500 transition-all resize-none font-medium custom-scrollbar"
                      ></textarea>
                      <button
                        type="button"
                        onClick={() => setIsNotesExpanded(false)}
                        className="absolute top-8 right-8 p-2 text-slate-400 hover:text-emerald-600 hover:bg-slate-100 rounded-xl transition-all flex items-center justify-center border border-slate-200 bg-white shadow-sm z-10"
                        title="Thu nhỏ"
                      >
                        <ShrinkIcon size={18} />
                      </button>
                    </div>
                  </div>
                ) : null}

                <div className="text-center flex flex-col gap-1 mb-4 mt-1">
                  <h2 className="text-xl sm:text-2xl font-bold text-slate-900 tracking-tight leading-tight">
                    {editingItem ? 'Cập nhật thông tin trường' : 'Thêm trường mới'}
                  </h2>
                  <p className="text-xs text-slate-400 font-normal leading-normal mt-1">
                    Vui lòng điền thông tin chi tiết của trường Đại học/Cao đẳng bên dưới.
                  </p>
                </div>

                <form onSubmit={handleSubmit} className="space-y-4 text-left flex flex-col flex-1 text-xs sm:text-sm">
                  {dbConflictItem && (
                    <div className="bg-amber-50 border border-amber-200 rounded-2xl p-3 flex items-start gap-2.5 animate-fadeIn">
                      <AlertTriangle className="text-amber-600 flex-shrink-0 mt-0.5" size={14} />
                      <div className="flex-1">
                        <h4 className="text-xs font-bold text-amber-950">Dữ liệu trên Google Sheets vừa thay đổi!</h4>
                        <p className="text-[11px] text-amber-800 leading-normal mt-0.5">
                          Dòng này vừa được thay đổi trực tiếp trên database bởi người khác. Nhấp để đồng bộ đè lên form hiện tại.
                        </p>
                      </div>
                      <button
                        type="button"
                        onClick={handleResolveConflict}
                        className="self-center px-2 py-1 bg-amber-600 hover:bg-amber-700 text-white rounded-lg text-xs font-bold transition-colors whitespace-nowrap"
                      >
                        Đồng bộ ngay
                      </button>
                    </div>
                  )}

                  <div className="space-y-4 flex-1 overflow-y-auto max-h-[460px] pr-0.5 custom-scrollbar">
                    <div className="space-y-1">
                      <label className="block text-xs font-medium text-slate-500">
                        Tên trường <span className="text-rose-500/80 ml-0.5">*</span>
                      </label>
                      <input
                        type="text"
                        name="Tentruong"
                        required
                        value={formData.Tentruong}
                        onChange={handleInputChange}
                        placeholder="Ví dụ: Đại học Quốc gia Seoul (SNU)"
                        className="w-full px-3.5 h-10 bg-slate-50/50 hover:bg-slate-50 border border-slate-200/60 rounded-xl text-xs sm:text-sm text-slate-800 placeholder-slate-400/80 focus:outline-none focus:ring-4 focus:ring-emerald-500/5 focus:border-emerald-500 transition-all font-medium focus:bg-white"
                      />
                    </div>

                    <div className="grid grid-cols-2 gap-3.5">
                      <div className="space-y-1">
                        <label className="block text-xs font-medium text-slate-500">
                          Khu vực
                        </label>
                        <div className="relative">
                          <select
                            name="Khuvuc"
                            value={formData.Khuvuc}
                            onChange={handleInputChange}
                            className="w-full px-3.5 h-10 bg-slate-50/50 hover:bg-slate-50 border border-slate-200/60 rounded-xl text-xs sm:text-sm text-slate-800 focus:outline-none focus:ring-4 focus:ring-emerald-500/5 focus:border-emerald-500 appearance-none font-medium cursor-pointer focus:bg-white"
                          >
                            <option value="">---</option>
                            {regionsList.map((region, idx) => (
                              <option key={idx} value={region}>{region}</option>
                            ))}
                          </select>
                          <ChevronDown className="absolute right-3.5 top-1/2 -translate-y-1/2 pointer-events-none text-slate-400/80" size={14} />
                        </div>
                      </div>

                      <div className="space-y-1">
                        <label className="block text-xs font-medium text-slate-500">
                          Loại hình trường
                        </label>
                        <div className="relative">
                          <select
                            name="Loaihinh"
                            value={formData.Loaihinh}
                            onChange={handleInputChange}
                            className="w-full px-3.5 h-10 bg-slate-50/50 hover:bg-slate-50 border border-slate-200/60 rounded-xl text-xs sm:text-sm text-slate-800 focus:outline-none focus:ring-4 focus:ring-emerald-500/5 focus:border-emerald-500 appearance-none font-medium cursor-pointer focus:bg-white"
                          >
                            {schoolTypesList.map((type, idx) => (
                              <option key={idx} value={type}>{type}</option>
                            ))}
                          </select>
                          <ChevronDown className="absolute right-3.5 top-1/2 -translate-y-1/2 pointer-events-none text-slate-400/80" size={14} />
                        </div>
                      </div>
                    </div>

                    <div className="grid grid-cols-2 gap-3.5">
                      <div className="space-y-1">
                        <label className="block text-xs font-medium text-slate-500">
                          Xếp hạng
                        </label>
                        <div className="relative">
                          <select
                            name="Xephang"
                            value={formData.Xephang}
                            onChange={handleInputChange}
                            className="w-full px-3.5 h-10 bg-slate-50/50 hover:bg-slate-50 border border-slate-200/60 rounded-xl text-xs sm:text-sm text-slate-800 focus:outline-none focus:ring-4 focus:ring-emerald-500/5 focus:border-emerald-500 appearance-none font-medium cursor-pointer focus:bg-white"
                          >
                            {rankingList.map((rank, idx) => (
                              <option key={idx} value={rank}>{rank}</option>
                            ))}
                          </select>
                          <ChevronDown className="absolute right-3.5 top-1/2 -translate-y-1/2 pointer-events-none text-slate-400/80" size={14} />
                        </div>
                      </div>

                      <div className="space-y-1">
                        <label className="block text-xs font-medium text-slate-500">
                          Học phí
                        </label>
                        <input
                          type="text"
                          name="Hocphi"
                          value={formData.Hocphi}
                          onChange={handleInputChange}
                          placeholder="Ví dụ: 3,000,000 KRW/kỳ"
                          className="w-full px-3.5 h-10 bg-slate-50/50 hover:bg-slate-50 border border-slate-200/60 rounded-xl text-xs sm:text-sm text-slate-800 placeholder-slate-400/80 focus:outline-none focus:ring-4 focus:ring-emerald-500/5 focus:border-emerald-500 transition-all font-medium focus:bg-white"
                        />
                      </div>
                    </div>

                    <div className="space-y-1">
                      <label className="block text-xs font-medium text-slate-500">
                        Thế mạnh đào tạo
                      </label>
                      <input
                        type="text"
                        name="Themanhdaotao"
                        value={formData.Themanhdaotao}
                        onChange={handleInputChange}
                        placeholder="Ví dụ: Kinh doanh, Kỹ thuật công nghệ, Nghệ thuật..."
                        className="w-full px-3.5 h-10 bg-slate-50/50 hover:bg-slate-50 border border-slate-200/60 rounded-xl text-xs sm:text-sm text-slate-800 placeholder-slate-400/80 focus:outline-none focus:ring-4 focus:ring-emerald-500/5 focus:border-emerald-500 transition-all font-medium focus:bg-white"
                      />
                    </div>

                    <div className="space-y-1">
                      <label className="block text-xs font-medium text-slate-500">
                        Ghi chú
                      </label>
                      
                      <div className="relative">
                        <textarea
                          name="Ghichu"
                          value={formData.Ghichu}
                          onChange={handleInputChange}
                          placeholder="Nhập ghi chú thêm về trường, học bổng hoặc lưu ý tuyển sinh..."
                          rows="10"
                          className="w-full pl-3.5 pr-11 py-2 bg-slate-50/50 hover:bg-slate-50 border border-slate-200/60 rounded-xl text-xs sm:text-sm text-slate-800 placeholder-slate-400/80 focus:outline-none focus:ring-4 focus:ring-emerald-500/5 focus:border-emerald-500 transition-all resize-none font-medium custom-scrollbar focus:bg-white"
                        ></textarea>
                        
                        <button
                          type="button"
                          onClick={() => setIsNotesExpanded(true)}
                          className="absolute top-2.5 right-2.5 p-1.5 text-slate-400/40 hover:text-emerald-600 rounded-lg transition-all flex items-center justify-center border border-transparent hover:border-slate-200 bg-transparent hover:bg-white shadow-none z-10 hover:opacity-100"
                          title="Phóng to ghi chú"
                        >
                          <ExpandIcon size={12} />
                        </button>
                      </div>
                    </div>
                  </div>

                  <div className="flex items-center justify-end gap-3 pt-4 border-t border-slate-100 w-full">
                    <button
                      type="button"
                      onClick={() => setModalOpen(false)}
                      className="px-5 py-2.5 bg-transparent border border-slate-200 hover:border-slate-300 text-slate-600 hover:text-slate-800 hover:bg-slate-50 rounded-xl text-xs sm:text-sm font-semibold transition-all active:scale-98 text-center"
                    >
                      Hủy
                    </button>
                    <button
                      type="submit"
                      className="px-6 py-2.5 bg-emerald-600 hover:bg-emerald-700 text-white rounded-xl text-xs sm:text-sm font-semibold shadow-sm hover:shadow-md hover:-translate-y-0.5 active:translate-y-0 transition-all text-center"
                    >
                      Lưu
                    </button>
                  </div>
                </form>
              </div>
            </div>
          )}

          {/* MODAL: AI CONSULTANT VIEW */}
          {aiModalOpen && (
            <div 
              onClick={(e) => {
                if (e.target === e.currentTarget) setAiModalOpen(false);
              }}
              className="fixed inset-0 bg-slate-950/60 backdrop-blur-sm flex items-center justify-center p-4 z-[9999] animate-fadeIn"
            >
              <div 
                onClick={(e) => e.stopPropagation()} 
                className="bg-white rounded-[24px] max-w-[940px] w-full shadow-2xl overflow-hidden border border-slate-100 transform transition-transform duration-300 scale-100 pt-4 pb-4 px-5 sm:pt-5 sm:pb-5 sm:px-6 flex flex-col gap-2.5 text-xs sm:text-sm"
              >
                
                <div className="text-center flex flex-col gap-1.5">
                  <div className="flex items-center justify-center gap-2 text-amber-500">
                    <Zap className="h-5.5 w-5.5 fill-amber-400 animate-pulse" />
                    <h2 className="text-base sm:text-lg font-extrabold text-slate-900">
                      Phân tích & Tư vấn của Trợ lý A.I
                    </h2>
                  </div>
                  <p className="text-xs text-slate-400 font-medium">
                    Hỗ trợ phân tích hướng nghiệp 7 bước du học Hàn Quốc chuyên sâu.
                  </p>
                </div>

                {/* Gemini & Google Sheets API Configuration Panel */}
                <div className="bg-amber-50/70 border border-amber-100 rounded-xl p-3 flex flex-col gap-3">
                  <div className="flex flex-col gap-1.5">
                    <label className="text-[10px] sm:text-xs font-extrabold text-amber-800 uppercase tracking-wider">
                      Khóa học thuật (Gemini API Key)
                    </label>
                    <div className="flex gap-2">
                      <input
                        type="password"
                        placeholder="Dán Gemini API Key của bạn..."
                        value={geminiApiKey}
                        onChange={(e) => setGeminiApiKey(e.target.value)}
                        className="flex-1 px-3 py-1 bg-white border border-amber-200 rounded-lg text-xs sm:text-sm focus:outline-none font-medium text-slate-700"
                      />
                      <button
                        type="button"
                        onClick={() => handleSaveApiKey(geminiApiKey)}
                        className="px-4 py-1 bg-amber-600 hover:bg-amber-700 text-white rounded-lg text-xs sm:text-sm font-bold transition-all active:scale-95"
                      >
                        Lưu Key
                      </button>
                    </div>
                  </div>

                  <div className="flex flex-col gap-1.5 border-t border-amber-200/50 pt-2.5">
                    <label className="text-[10px] sm:text-xs font-extrabold text-amber-800 uppercase tracking-wider">
                      Đường dẫn Database (Google Sheets Apps Script URL)
                    </label>
                    <div className="flex gap-2">
                      <input
                        type="text"
                        placeholder="Dán URL Google Apps Script Web App..."
                        value={apiUrl}
                        onChange={(e) => {
                          setApiUrl(e.target.value);
                          localStorage.setItem('gs_api_url', e.target.value);
                        }}
                        className="flex-1 px-3 py-1 bg-white border border-amber-200 rounded-lg text-xs sm:text-sm focus:outline-none font-medium text-slate-700"
                      />
                      <button
                        type="button"
                        onClick={() => {
                          fetchData(apiUrl, false);
                          showAlert('Đã cập nhật kết nối Database!', 'success');
                        }}
                        className="px-4 py-1 bg-amber-600 hover:bg-amber-700 text-white rounded-lg text-xs sm:text-sm font-bold transition-all active:scale-95"
                      >
                        Kết nối
                      </button>
                    </div>
                  </div>
                </div>

                <div className="max-h-[300px] overflow-y-auto text-left pr-1 custom-scrollbar border border-slate-100 rounded-2xl bg-[#fafafc] p-4 text-xs sm:text-sm">
                  {aiLoading ? (
                    <div className="space-y-4 py-4">
                      <div className="flex items-center gap-3 text-amber-600 font-bold text-xs sm:text-sm animate-pulse justify-center">
                        <Sparkles className="animate-spin text-amber-500" size={18} />
                        <span>Hệ thống A.I đang thu thập dữ liệu tuyển sinh...</span>
                      </div>
                      <div className="space-y-2.5">
                        <div className="h-3.5 bg-slate-100 rounded-full w-full animate-pulse"></div>
                        <div className="h-3.5 bg-slate-100 rounded-full w-5/6 animate-pulse"></div>
                        <div className="h-3.5 bg-slate-100 rounded-full w-4/5 animate-pulse"></div>
                      </div>
                    </div>
                  ) : (
                    <div className="prose prose-sm text-slate-700 leading-relaxed font-medium text-xs sm:text-sm whitespace-pre-wrap">
                      {aiResponse}
                    </div>
                  )}
                </div>

                <div className="flex gap-4 w-full pt-1 justify-between">
                  <button
                    type="button"
                    onClick={() => setAiModalOpen(false)}
                    className="flex-1 py-2 bg-slate-100 hover:bg-slate-200 text-slate-600 rounded-2xl text-xs sm:text-sm font-bold transition-all active:scale-95 text-center"
                  >
                    Đóng
                  </button>
                  <button
                    type="button"
                    onClick={() => setAiModalOpen(false)}
                    className="flex-1 py-2 bg-emerald-600 hover:bg-emerald-700 text-white rounded-2xl text-xs sm:text-sm font-bold transition-all active:scale-95 text-center shadow-lg shadow-emerald-500/10"
                  >
                    Xác nhận
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* TOAST NOTIFICATION CONTAINER */}
          {alert && (
            <div className="fixed bottom-5 right-5 z-[9999] flex items-center gap-2 px-4 py-3 rounded-xl shadow-lg border animate-slideIn text-xs sm:text-sm" style={{
              backgroundColor: alert.type === 'success' ? '#ECFDF5' : '#FEF2F2',
              borderColor: alert.type === 'success' ? '#A7F3D0' : '#FCA5A5',
              color: alert.type === 'success' ? '#065F46' : '#991B1B'
            }}>
              {alert.type === 'success' ? <Check size={18} /> : <AlertCircle size={18} />}
              <span className="font-bold">{alert.message}</span>
            </div>
          )}

        </div>
      );
    }

    const rootElement = document.getElementById('root');
    const root = ReactDOM.createRoot(rootElement);
    root.render(<App />);
  </script>
</body>
</html>
